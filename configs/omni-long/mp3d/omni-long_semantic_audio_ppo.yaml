ENVIRONMENT:
  MAX_EPISODE_STEPS: 1000

SIMULATOR:
  HABITAT_SIM_V0:
    GPU_DEVICE_ID: 0

  TYPE: "ContinuousSoundSpacesSim"
  ACTION_SPACE_CONFIG: "v0"
  SCENE_DATASET: "data/scene_datasets/mp3d/mp3d.scene_dataset_config.json"
  GRID_SIZE: 1.0
  FORWARD_STEP_SIZE: 0.25
  TURN_ANGLE: 30
  STEP_TIME: 0.25
  USE_RENDERED_OBSERVATIONS: False

  RGB_SENSOR:
    WIDTH: 224
    HEIGHT: 224
    HFOV: 90
    POSITION: [0.0, 1.25, 0.0]

  DEPTH_SENSOR:
    WIDTH: 224
    HEIGHT: 224
    HFOV: 90
    POSITION: [0.0, 1.25, 0.0]

  SEMANTIC_SENSOR:
    WIDTH: 224
    HEIGHT: 224
    HFOV: 90
    POSITION: [0.0, 1.25, 0.0]

  AGENT_0:
    SENSORS: ["RGB_SENSOR", "DEPTH_SENSOR", "SEMANTIC_SENSOR"]

  AUDIO:
    EVERLASTING: True
    RIR_SAMPLING_RATE: 16000
    SOURCE_SOUND_DIR: "data/sounds/semantic_splits"
    CROSSFADE: True

TASK:
  TYPE: "OmniLongSemanticAudioNav"
  GOAL_ORDER_MODE: "ordered"
  UNORDERED_TARGET_LOCK_ENABLED: True
  UNORDERED_TARGET_LOCK_ACQUIRE_PROGRESS: 1.0
  UNORDERED_TARGET_LOCK_ALLOW_RELEASE: True
  UNORDERED_TARGET_LOCK_RELEASE_DISTANCE_DELTA: 2.0

  POSSIBLE_ACTIONS: ["STOP", "LIFELONG_SUBMIT", "MOVE_FORWARD", "TURN_LEFT", "TURN_RIGHT"]
  ACTIONS:
    LIFELONG_SUBMIT:
      TYPE: "LifelongSubmitAction"

  SUCCESS_DISTANCE: 1.0
  SUCCESS:
    SUCCESS_DISTANCE: 1.0

  TOP_DOWN_MAP:
    DRAW_SHORTEST_PATH: False
    DRAW_GOAL_POSITIONS: True
    DRAW_VIEW_POINTS: False
    DRAW_GOAL_AABBS: False

  SENSORS: [
    "OMNI_LONG_GOAL_IMAGE_SENSOR",
    "OMNI_LONG_GOAL_TEXT_SENSOR",
    "OMNI_LONG_GOAL_MODALITY_SENSOR",
    "OMNI_LONG_GOAL_MASK_SENSOR",
    "OMNI_LONG_TASK_MODE_SENSOR",
    "GPS_SENSOR",
    "COMPASS_SENSOR",
    "AUDIOGOAL_SENSOR",
    "POINTGOAL_WITH_GPS_COMPASS_SENSOR"
  ]

  GOAL_SENSOR_UUID: "omni_long_goal"

  OMNI_LONG_GOAL_IMAGE_SENSOR:
    TYPE: "OmniLongGoalImageSensor"
    MAX_GOALS: 5
    WIDTH: 224
    HEIGHT: 224

  OMNI_LONG_GOAL_TEXT_SENSOR:
    TYPE: "OmniLongGoalTextSensor"
    MAX_GOALS: 5
    MAX_TEXT_BYTES: 256
    CATEGORY_PROMPT_TEMPLATE: "Find the {category}."

  OMNI_LONG_GOAL_MODALITY_SENSOR:
    TYPE: "OmniLongGoalModalitySensor"
    MAX_GOALS: 5

  OMNI_LONG_GOAL_MASK_SENSOR:
    TYPE: "OmniLongGoalMaskSensor"
    MAX_GOALS: 5

  OMNI_LONG_TASK_MODE_SENSOR:
    TYPE: "OmniLongTaskModeSensor"

  POINTGOAL_WITH_GPS_COMPASS_SENSOR:
    GOAL_FORMAT: "CARTESIAN"
    DIMENSIONALITY: 2

  DISTANCE_TO_GOAL:
    TYPE: "OmniLongDistanceToGoal"
    DISTANCE_TO: "VIEW_POINTS"

  LIFELONG_GOALS_FOUND:
    TYPE: "LifelongGoalsFound"

  LIFELONG_GOAL_COMPLETION:
    TYPE: "LifelongGoalCompletion"

  LIFELONG_TASK_SUCCESS:
    TYPE: "LifelongTaskSuccess"

  OMNI_LONG_DISTANCE_TO_GOAL_REWARD:
    TYPE: "OmniLongDistanceToGoalReward"
    DISTANCE_REWARD_SCALE: 1.0
    SUBMIT_SUCCESS_REWARD: 0.0
    SUBMIT_SUCCESS_REWARD_INCREMENT: 0.0
    ORDERED_DISTANCE_REWARD_SCALE: 1.0
    UNORDERED_DISTANCE_REWARD_SCALE: 1.0
    ORDERED_SUBMIT_SUCCESS_REWARD: 0.0
    UNORDERED_SUBMIT_SUCCESS_REWARD: 0.0
    ORDERED_SUBMIT_SUCCESS_REWARD_INCREMENT: 0.0
    UNORDERED_SUBMIT_SUCCESS_REWARD_INCREMENT: 0.0
    ORDERED_INACTIVE_GOAL_PENALTY: 0.0
    UNORDERED_DENSE_REWARD_MODE: "global_path_reduction"

  MEASUREMENTS: [
    "DISTANCE_TO_GOAL",
    "SUCCESS",
    "SPL",
    "SOFT_SPL",
    "NUM_ACTION",
    "LIFELONG_GOALS_FOUND",
    "LIFELONG_GOAL_COMPLETION",
    "LIFELONG_TASK_SUCCESS",
    "OMNI_LONG_DISTANCE_TO_GOAL_REWARD"
  ]

DATASET:
  TYPE: "OmniLongNav"
  SPLIT: "train"
  CONTENT_SCENES: ["*"]
  VERSION: "v1"
  SCENES_DIR: "data/scene_datasets/mp3d"
  DATA_PATH: "data/datasets/omni_long/mp3d/{version}/{split}/{split}.json.gz"
